version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: digisho-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: digisho
      MONGO_INITDB_ROOT_PASSWORD: digisho_secure_pass
      MONGO_INITDB_DATABASE: digisho
    volumes:
      - mongo_data:/data/db
    networks:
      - digisho-net

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digisho-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://digisho:digisho_secure_pass@mongo:27017/digisho?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 30d
      CUSTOMER_URL: ${CUSTOMER_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3001}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_NAME: DigiSho
      FROM_EMAIL: ${SMTP_EMAIL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    depends_on:
      - mongo
    networks:
      - digisho-net

  # ── Customer Frontend ────────────────────────────────────
  customer:
    build:
      context: ./frontend-customer
      dockerfile: Dockerfile
    container_name: digisho-customer
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    depends_on:
      - backend
    networks:
      - digisho-net

  # ── Admin Dashboard ──────────────────────────────────────
  admin:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: digisho-admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_CUSTOMER_URL: ${CUSTOMER_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - digisho-net

networks:
  digisho-net:
    driver: bridge

volumes:
  mongo_data:
